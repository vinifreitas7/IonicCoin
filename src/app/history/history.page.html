<ion-header>
  <ion-toolbar>
    <ion-title>Histórico de Conversões</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list>

    <ion-item *ngFor="let item of history">

      <ion-label>

        {{ item.amount }}
        {{ item.from }}

        →

        {{ item.result | number:'1.2-2' }}

        {{ item.to }}

      </ion-label>

    </ion-item>

  </ion-list>

</ion-content>
